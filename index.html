<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
      
    <!-- Page title -->
    <title>Animal Market</title>

    <!-- Main stylesheets -->
    <link rel="stylesheet" href="style/base.css">
    <link rel="stylesheet" href="style/header.css">
    <link rel="stylesheet" href="style/hero-section.css">

</head>

<body>

    <!--header / navigation-->
    <header>
        <div class="nav-container">

            <!-- Main navigation -->
            <nav class="navbar">

                <!--logo + navigation -->
                <div class="nav-left">

                    <!-- Logo  -->
                    <a href="/">
                        <img src="image/logo.png" alt="Animal Market logo" class="logo">
                    </a>

                    <!-- Primary navigation links -->
                    <ul class="nav-links">
                        <li><a href="#">Catégories</a></li>
                        <li><a href="#">Avantages</a></li>
                        <li><a href="#">Promotions</a></li>
                    </ul>

                </div>

                <!-- Call-to-action button -->
                <a href="#" class="btn">Télécharger l'app</a>

            </nav>
        </div>
    </header>


    <!-- MAIN CONTENT -->
    <main>

        <!--  message + download buttons -->
        <section class="hero">

            <div class="hero-content">

                <!-- Main heading -->
                <h1>
                    Tout pour vos<br>
                    animaux, livré<br>
                    chez vous
                  </h1>

                <!-- Description -->
                <p>
                    Commandez croquettes, accessoires et produits
                    de soin facilement depuis l'application.
                </p>

                <!-- App store buttons -->
                <div class="hero-buttons">

                    <!-- App Store button -->
                    <a href="#" class="store-btn">
                        <img src="image/apple.png" alt="Download on the App Store">
                        <div class="store-text">
                            <span>Télécharger sur</span>
                            <strong>App Store</strong>
                        </div>
                    </a>

                    <!-- Google Play button -->
                    <a href="#" class="store-btn">
                        <img src="image/play.png" alt="Get it on Google Play">
                        <div class="store-text">
                            <span>Disponible sur</span>
                            <strong>Google Play</strong>
                        </div>
                    </a>

                </div>

                <!-- ratings & users -->
                <ul class="hero-info">

                    <li class="info-item">
                        <img src="image/icon.png" alt="Rating van 4.8 uit 5 sterren">
                        4.8/5 sur les stores
                    </li>

                    <li class="info-item">
                        <img src="image/vector.png" alt="Meer dan 5000 klanten">
                        +5 000 clients
                    </li>

                </ul>

            </div>
        </section>

    </main>

</body>
</html>
